<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Hexagon Finance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#444646",
                        "on-tertiary-fixed-variant": "#454747",
                        "error-container": "#93000a",
                        "surface-bright": "#393939",
                        "on-primary-container": "#cca1ff",
                        "surface-container-high": "#2a2a2a",
                        "secondary-container": "#ff7f1c",
                        "on-primary-fixed": "#2a0053",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#ffb68b",
                        "surface-dim": "#131313",
                        "secondary": "#ffb68b",
                        "primary-fixed-dim": "#dab9ff",
                        "on-background": "#e5e2e1",
                        "on-tertiary-container": "#b3b4b4",
                        "on-primary": "#441079",
                        "surface-tint": "#dab9ff",
                        "on-secondary-fixed-variant": "#753400",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "primary-container": "#5b2d90",
                        "on-tertiary": "#2f3131",
                        "inverse-primary": "#7547ab",
                        "primary": "#dab9ff",
                        "on-surface": "#e5e2e1",
                        "outline-variant": "#4b4451",
                        "outline": "#968e9c",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#ffdbc8",
                        "on-secondary-container": "#602a00",
                        "surface": "#131313",
                        "surface-variant": "#353534",
                        "surface-container": "#201f1f",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-container-highest": "#353534",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary-fixed": "#321200",
                        "primary-fixed": "#eedbff",
                        "tertiary": "#c6c6c7",
                        "on-secondary": "#522300",
                        "on-surface-variant": "#cdc3d3",
                        "on-error": "#690005",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#5c2e91",
                        "inverse-on-surface": "#313030"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "base": "8px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0e0e0e;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .ambient-glow-1 {
            background: radial-gradient(circle, rgba(91, 45, 144, 0.15) 0%, rgba(14, 14, 14, 0) 70%);
        }

        .ambient-glow-2 {
            background: radial-gradient(circle, rgba(255, 122, 0, 0.1) 0%, rgba(14, 14, 14, 0) 70%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-focus-glow:focus-within {
            box-shadow: 0 0 15px rgba(218, 185, 255, 0.2);
        }
    </style>
</head>
<body class="font-body-md text-on-surface min-h-screen flex items-center justify-center relative px-margin-mobile">
<!-- Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute -top-1/4 -left-1/4 w-[800px] h-[800px] ambient-glow-1 rounded-full"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-[800px] h-[800px] ambient-glow-2 rounded-full"></div>
<!-- Animated Subtle Grid -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(circle at 2px 2px, #fff 1px, transparent 0); background-size: 40px 40px;"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Header / Brand -->
<div class="flex flex-col items-center mb-8">
<img alt="Hexagon Finance Logo" class="h-16 w-16 mb-4 drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/AP1WRLvjFxEYpFKYVXF8lJsqr_ojcsIWBOJ7y9NxCVF4Jm9FAk4hp46AQ0hS6LzOXDOpV_FqGQPUndM_U1zvIkwPBrLXt5yc37Z-odJRnoXenVX55XZKYJXvBr_DBn1rrijjG7l_42GCO7UQEy5vkA1qDrLT1inB2US9gcBfn-pnuoE-KYpejJM5dYkYZ8ZHMX70gHjbKn5mR8Qh0_RVFceo2vkpTvnwVW3q99qjBuDcrjD_S3xY2pXALg6-u7aa"/>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Admin Portal</h1>
<p class="text-on-surface-variant font-body-md opacity-70">Institutional Management Suite</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-card rounded-xl p-8 md:p-10 shadow-2xl">
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group input-focus-glow rounded-lg">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 rounded-lg py-3 pl-11 pr-4 text-on-surface transition-all placeholder:text-outline/50" id="email" name="email" placeholder="name@hexagon.finance" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group input-focus-glow rounded-lg">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 rounded-lg py-3 pl-11 pr-12 text-on-surface transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-lowest text-secondary-container focus:ring-offset-background focus:ring-secondary-container" id="remember" name="remember" type="checkbox"/>
<label class="ml-3 font-body-md text-on-surface-variant cursor-pointer" for="remember">Remember this session</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-secondary-container hover:bg-[#FF8A30] text-on-secondary-container font-headline-md text-headline-md py-4 rounded-lg shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Security Footer -->
<div class="mt-8 pt-8 border-t border-outline-variant/30 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-sm text-label-sm text-outline tracking-normal">Secure Multi-Factor Authentication Active</span>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Security Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Legal</a>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Simple login animation logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span> Authenticating...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-green-400">check_circle</span> Access Granted';
                btn.classList.replace('bg-secondary-container', 'bg-green-600');
                
                // Mock redirect
                setTimeout(() => {
                    alert('Redirecting to Hexagon Portal Dashboard...');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-secondary-container');
                }, 1000);
            }, 1500);
        });

        // Atmospheric parallax effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelector('.ambient-glow-1').style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            document.querySelector('.ambient-glow-2').style.transform = `translate(${-x * 50}px, ${-y * 50}px)`;
        });
    </script>
</body></html>
